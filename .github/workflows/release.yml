name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        # Run install ONLY inside meetily/frontend to avoid the root
        # pnpm-workspace.yaml overrides that exclude Windows platform binaries
        # (those overrides are Replit/Linux-only and break Windows CI builds)
        working-directory: meetily/frontend
        run: pnpm install --no-frozen-lockfile --ignore-workspace
        env:
          # Tell pnpm to ignore the root workspace config entirely
          npm_config_ignore_workspace_root_check: "true"

      - name: Build Tauri app
        working-directory: meetily/frontend
        run: pnpm tauri build

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meetily/frontend/src-tauri/target/release/bundle/nsis/*.exe
            meetily/frontend/src-tauri/target/release/bundle/msi/*.msi
