name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: CI diagnostics (Node/pnpm/lockfile/overrides)
        shell: bash
        run: |
          echo "Node version: $(node -v)"
          echo "pnpm version: $(pnpm -v)"
          echo "pnpm-lock.yaml sha256: $(sha256sum pnpm-lock.yaml | awk '{print $1}')"
          echo "--- pnpm-lock.yaml (first 40 lines) ---"
          sed -n '1,40p' pnpm-lock.yaml
          echo "--- pnpm-workspace.yaml overrides block ---"
          awk '
            /^overrides:/ {print; in_block=1; next}
            in_block && /^[^[:space:]]/ {exit}
            in_block {print}
          ' pnpm-workspace.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: meetily/frontend
        run: pnpm tauri build

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meetily/frontend/src-tauri/target/release/bundle/nsis/*.exe
            meetily/frontend/src-tauri/target/release/bundle/msi/*.msi
