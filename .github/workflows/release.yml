name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.2

      - name: CI diagnostics (Node/pnpm/lockfile/overrides)
        shell: bash
        run: |
          echo "Node version: $(node -v)"
          echo "pnpm version: $(pnpm -v)"
          echo "pnpm-lock.yaml sha256: $(sha256sum pnpm-lock.yaml | awk '{print $1}')"
          if [ ! -f meetily/frontend/pnpm-lock.yaml ]; then
            echo "ERROR: meetily/frontend/pnpm-lock.yaml is missing in repository checkout. Commit this lockfile for deterministic release builds." >&2
            exit 1
          fi
          echo "meetily/frontend/pnpm-lock.yaml sha256: $(sha256sum meetily/frontend/pnpm-lock.yaml | awk '{print $1}')"
          echo "--- pnpm-lock.yaml (first 40 lines) ---"
          sed -n '1,40p' pnpm-lock.yaml
          echo "--- meetily/frontend/pnpm-lock.yaml (first 40 lines) ---"
          sed -n '1,40p' meetily/frontend/pnpm-lock.yaml
          echo "--- pnpm-workspace.yaml overrides block ---"
          awk '
            /^overrides:/ {print; in_block=1; next}
            in_block && /^[^[:space:]]/ {exit}
            in_block {print}
          ' pnpm-workspace.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Meetily frontend dependencies
        working-directory: meetily/frontend
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build llama-helper sidecar (Windows CPU)
        shell: pwsh
        run: |
          cargo build --release -p llama-helper --manifest-path meetily/Cargo.toml
          New-Item -ItemType Directory -Force -Path "meetily/frontend/src-tauri/binaries" | Out-Null
          Copy-Item "meetily/target/release/llama-helper.exe" -Destination "meetily/frontend/src-tauri/binaries/llama-helper-x86_64-pc-windows-msvc.exe" -Force
          Get-ChildItem "meetily/frontend/src-tauri/binaries"

      - name: Verify sidecar binaries exist
        shell: pwsh
        run: |
          if (!(Test-Path "meetily/frontend/src-tauri/binaries/llama-helper-x86_64-pc-windows-msvc.exe")) {
            throw "Missing llama-helper sidecar binary"
          }

      - name: Verify native Windows toolchain
        shell: pwsh
        run: |
          cargo --version
          rustc --version
          $clPath = (Get-Command cl.exe -ErrorAction Stop).Source
          $linkPath = (Get-Command link.exe -ErrorAction Stop).Source
          Write-Host "cl.exe: $clPath"
          Write-Host "link.exe: $linkPath"
          if ($clPath -notmatch 'Microsoft Visual Studio') {
            throw "cl.exe is not from Visual Studio toolchain"
          }

      - name: Verify Tauri CLI is available
        working-directory: meetily/frontend
        shell: bash
        run: |
          pnpm exec tauri --version

      - name: Build Tauri app
        working-directory: meetily/frontend
        run: pnpm tauri build

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meetily/frontend/src-tauri/target/release/bundle/nsis/*.exe
            meetily/frontend/src-tauri/target/release/bundle/msi/*.msi
