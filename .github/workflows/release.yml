name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Remove Linux-only overrides from pnpm-workspace.yaml
        # The root pnpm-workspace.yaml contains overrides that exclude all
        # Windows/macOS/ARM platform binaries (written for Replit Linux servers).
        # These cause ERR_PNPM_LOCKFILE_CONFIG_MISMATCH on Windows CI.
        # We strip the entire overrides block before installing.
        shell: pwsh
        run: |
          $content = Get-Content pnpm-workspace.yaml -Raw
          # Remove everything from the 'overrides:' key to end of file
          $content = $content -replace '(?s)\noverrides:.*$', ''
          Set-Content pnpm-workspace.yaml $content
          Write-Host "Cleaned pnpm-workspace.yaml:"
          Get-Content pnpm-workspace.yaml

      - name: Install all workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri app
        working-directory: meetily/frontend
        run: pnpm tauri build

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meetily/frontend/src-tauri/target/release/bundle/nsis/*.exe
            meetily/frontend/src-tauri/target/release/bundle/msi/*.msi
